    .compact-list{margin:6px 0 0;padding-left:19px}.compact-list li{margin:5px 0}.question-groups{display:grid;gap:11px}.question-group+.question-group{padding-top:10px;border-top:1px solid var(--line)}.question-head{display:flex;align-items:center;gap:7px;color:var(--muted);font-size:12px}.priority-badge{display:inline-flex;border-radius:999px;padding:2px 7px;font-size:11px;font-weight:800}.priority-badge.P0{color:#87413b;background:#f7ecea}.priority-badge.P1{color:#76551f;background:#f8f2e6}.priority-badge.P2{color:#596273;background:#edf0f4}.question-list{margin:5px 0 0;padding-left:19px}.question-list li{margin:5px 0}.doc-links{display:grid;gap:6px}.doc-links a{color:var(--blue);text-decoration:none;overflow-wrap:anywhere}.doc-links a:hover{text-decoration:underline}

    code{background:#f2f4f7;border-radius:4px;padding:1px 4px}pre{margin:0;padding:11px;border-radius:7px;background:#101722;color:#dbe6f5;font:12px/1.5 "SFMono-Regular",Consolas,monospace;white-space:pre-wrap;word-break:break-word;max-height:520px;overflow:auto}
    details{border:1px solid var(--line);border-radius:8px;margin:9px 0;overflow:hidden}summary{display:flex;align-items:center;gap:9px;padding:10px 12px;background:#fafbfd;cursor:pointer;font-weight:700}.grow{flex:1}.detail{padding:12px}.case-meta{display:flex;flex-wrap:wrap;gap:7px;align-items:center;color:var(--muted);font-size:12px}.http-status{font-weight:800;color:var(--blue)}.raw-block{margin-top:14px}.raw-pair{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:12px}.raw-message{min-width:0;margin-top:12px}.raw-title{margin:0 0 5px;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.04em}
    .empty{padding:14px;border:1px dashed #cfd5df;border-radius:8px;color:var(--muted)}.finding{border-left:4px solid var(--amber);padding:13px 14px;background:var(--amber-soft);margin:9px 0;border-radius:0 8px 8px 0}.finding.P0,.finding.P1{border-left-color:var(--red);background:var(--red-soft)}.finding-head{display:flex;gap:8px;align-items:center;margin-bottom:8px}.diff-line{display:grid;grid-template-columns:90px 1fr;gap:9px;margin:5px 0}.diff-label{color:var(--muted);font-size:12px}

    .scenario-name-list{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:5px 22px;max-height:210px;overflow:auto;margin:0;padding:0 4px 0 20px}.scenario-name-list li{padding:2px 0;overflow-wrap:anywhere}.scenario-note{margin:10px 0;padding:9px 11px;border-left:3px solid #98a2b3;background:#fafbfc;color:#475467}.scenario-progress{display:grid;grid-template-columns:auto 1fr;gap:8px 11px;align-items:center;margin:12px 0;padding:10px 12px;border:1px solid #d8dee7;border-radius:8px;background:#fafbfc;color:var(--ink)}.scenario-progress.BLOCKED{box-shadow:inset 3px 0 #c59a55}.scenario-progress.DOCUMENT_MISMATCH{box-shadow:inset 3px 0 #c87d76}.scenario-progress.OBSERVED{box-shadow:inset 3px 0 #7f9bb8}.scenario-progress.PASS{box-shadow:inset 3px 0 #7ca895}.scenario-progress.NOT_EXECUTED{color:#596273}.progress-copy{font-weight:650}.progress-meter{grid-column:1/-1;height:4px;overflow:hidden;border-radius:99px;background:#e3e7ed}.progress-meter span,.scenario-progress.BLOCKED .progress-meter span{display:block;height:100%;border-radius:inherit;background:#8291a8}.steps{display:flex;gap:7px;align-items:flex-start;overflow-x:auto;scrollbar-color:#cbd2dc transparent;padding:2px 2px 9px}.step{flex:0 0 232px;position:relative;border:1px solid #dce1e8;border-radius:8px;padding:10px 11px;background:#fff;box-shadow:0 1px 2px #17203308}.step.completed{border-color:#d8dee6}.step.blocked{border-color:var(--status-blocked-border);box-shadow:inset 3px 0 #c59a55}.step.pending{border-style:dashed;background:#fbfcfd;color:#687183;box-shadow:none}.step-head{display:flex;gap:7px;align-items:flex-start;justify-content:space-between}.step-head strong{font-size:14px;line-height:1.35}.step-interface{margin:2px 0 7px;color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.05em}.step-io{display:grid}.step-zone{display:grid;grid-template-columns:34px minmax(0,1fr);gap:5px;min-width:0;padding:4px 0;border:0;background:transparent}.step-zone+.step-zone{border-top:1px dashed #e5e9ef}.field-list{display:flex;flex-wrap:wrap;gap:2px 10px;min-width:0}.field-item{color:#344054;font:12px/1.35 "SFMono-Regular",Consolas,monospace;overflow-wrap:anywhere;word-break:break-word}.field-empty{color:#98a2b3;font-size:12px}.step-outcome{margin-top:5px;padding-top:6px;border-top:1px solid var(--line)}.step-result{margin:3px 0 6px;padding:5px 7px;border-radius:4px;background:#f5f7fa;color:#344054;font-size:12px}.step.blocked .step-result{background:var(--status-blocked-bg);color:var(--status-blocked-fg)}.step.pending .step-result{background:#f2f4f7;color:#667085}.step-evidence{min-height:0}.step-evidence .chip-row{gap:4px;margin-top:4px}.step-evidence .chip{padding:2px 6px;font-size:11px}.step-evidence .empty-evidence{color:#98a2b3;font-size:11px}.arrow{flex:0 0 auto;align-self:center;color:#8993a2;font-size:17px}.footer{margin-top:35px;border-top:1px solid var(--line);padding-top:14px;color:var(--muted);font-size:12px}
    @media(max-width:950px){header{padding:26px 20px}main{padding:20px 14px}.grid,.grid.three,.crypto-grid{grid-template-columns:1fr}.card.wide{grid-column:auto}.tabs{padding:0 6px}.lead{display:block}.diff-line{grid-template-columns:1fr;gap:2px}.scenario-name-list{grid-template-columns:1fr}}
    @media(max-width:560px){.raw-pair{grid-template-columns:1fr}}
    @media print{.tabs{display:none}.panel{display:block!important;page-break-before:always}.panel:first-child{page-break-before:auto}details>.detail{display:block}}

<body>
<div class="shell">
  <header>
    <div class="eyebrow">THIRD-PARTY API · DOCUMENTATION VS EVIDENCE</div>
    <h1 id="title"></h1>
    <div class="subtitle" id="summary"></div>
    <div class="stats" id="stats"></div>
  </header>
  <nav class="tabs" id="tabs"></nav>
  <main id="panels"></main>
</div>
<script id="report-data" type="application/json">__REPORT_DATA__</script>
<script>
const report=JSON.parse(document.getElementById("report-data").textContent);
const $=(tag,cls,text)=>{const n=document.createElement(tag);if(cls)n.className=cls;if(text!==undefined)n.textContent=text;return n};
const pretty=v=>typeof v==="string"?v:JSON.stringify(v,null,2);
const empty=v=>v==null||v===""||(Array.isArray(v)&&!v.length)||(typeof v==="object"&&!Array.isArray(v)&&!Object.keys(v).length);
const badge=v=>$("span","badge "+(v||"NOT_EXECUTED"),v||"NOT_EXECUTED");
const verdictValues=new Set(["PASS","DOCUMENT_MISMATCH","OBSERVED","BLOCKED","NOT_APPLICABLE","NOT_EXECUTED","COMPLETE_WITH_LIMITATIONS"]);
const short=(v,max=120)=>{const text=typeof v==="string"?v:JSON.stringify(v);return text.length>max?text.slice(0,max-1)+"…":text};
const primitive=v=>v==null?"—":Array.isArray(v)?v.map(x=>short(x,42)).join("、"):typeof v==="object"?Object.entries(v).slice(0,6).map(([k,item])=>`${k}=${short(item,64)}`).join("；"):String(v);
function section(title){const s=$("section"),h=$("h3","",title),b=$("div");s.append(h,b);return {root:s,body:b}}
function chip(text,code=false){const c=$("span","chip");c.append($(code?"code":"span","",String(text)));return c}
function chipRow(items,code=false){const row=$("div","chip-row");(items||[]).filter(x=>!empty(x)).forEach(x=>row.append(chip(x,code)));return row}
function fieldList(items){const list=$("div","field-list"),values=(items||[]).filter(x=>!empty(x));if(!values.length){list.append($("div","field-empty","—"));return list}values.forEach(item=>list.append($("div","field-item",primitive(item))));return list}
function listCard(title,items){const c=$("div","card"),h=$("h4","",title);c.append(h);if(!items?.length){c.append($("div","empty","无"));return c}const ul=$("ul","compact-list");items.forEach(item=>ul.append($("li","",primitive(item))));c.append(ul);return c}
function questionCard(items){const c=$("div","card"),h=$("h4","","外部待确认事项"),body=$("div","question-groups"),definitions={P0:"必须确认",P1:"建议确认",P2:"允许忽略"},normalized=(items||[]).map(item=>typeof item==="string"?{priority:"P1",question:item}:item);c.append(h);["P0","P1","P2"].forEach(priority=>{const rows=normalized.filter(item=>item?.priority===priority);if(!rows.length)return;const group=$("div","question-group"),head=$("div","question-head"),tag=$("span",`priority-badge ${priority}`,priority),ul=$("ul","question-list");head.append(tag,$("span","",definitions[priority]));rows.forEach(item=>ul.append($("li","",item.question)));group.append(head,ul);body.append(group)});if(!body.children.length)body.append($("div","empty","无"));c.append(body);return c}
function kvList(rows){const body=$("div","kv");(rows||[]).filter(([,v])=>!empty(v)).forEach(([k,v])=>{const row=$("div","kv-row"),value=$("div","kv-value");if(typeof v==="string"&&verdictValues.has(v))value.append(badge(v));else value.textContent=primitive(v);row.append($("div","kv-key",k),value);body.append(row)});if(!body.children.length)body.append($("div","empty","未记录"));return body}
function kvCard(title,rows){const c=$("div","card"),h=$("h4","",title);c.append(h,kvList(rows));return c}
function flatten(value,prefix="",limit=12,out=[]){if(out.length>=limit||empty(value))return out;if(Array.isArray(value)){out.push([prefix||"范围",value.map(x=>short(x,48)).join("、")]);return out}if(typeof value!=="object"){out.push([prefix||"值",short(value)]);return out}for(const [key,item] of Object.entries(value)){if(out.length>=limit)break;if(empty(item))continue;const path=prefix?`${prefix}.${key}`:key;if(item&&typeof item==="object"&&!Array.isArray(item))flatten(item,path,limit,out);else out.push([path,Array.isArray(item)?item.map(x=>short(x,40)).join("、"):short(item)])}return out}
function compactObjectCard(title,value){return kvCard(title,flatten(value))}
const cryptoLabels={source:"文档来源",algorithm:"算法",key:"密钥",keySource:"密钥来源",message:"参与计算的数据",encoding:"字符 / 字节规则",output:"输出格式",signatureLocation:"签名位置",comparison:"比较方式",transport:"传输加密",fieldEncryption:"字段加密",mode:"模式",padding:"填充",iv:"IV",nonce:"Nonce",tag:"认证标签",aad:"AAD"};
function cryptoRows(value){return flatten(value,"",20).map(([k,v])=>[cryptoLabels[k]||k,v])}
function cryptoPane(title,data,official=false){const pane=$("div","crypto-pane"),head=$("div","crypto-pane-head");head.append($("strong","",title));if(!official&&data?.verdict)head.append(badge(data.verdict));pane.append(head);if(empty(data)){pane.append($("div","empty","未记录"));return pane}if(official){pane.append(kvList(cryptoRows(data)));return pane}const rows=[["运行环境",data.runtime],["测试向量",data.testVector],["实测结果",data.observed]];pane.append(kvList(rows));if(data.evidenceIds?.length){const evidence=$("div","crypto-evidence");evidence.append(chipRow(data.evidenceIds,true));pane.append(evidence)}if(data.code){const d=$("details","crypto-code"),summary=$("summary","","查看可执行代码"),pre=$("pre");pre.textContent=data.code;d.append(summary,pre);pane.append(d)}return pane}
function cryptoSection(title,value){const root=$("div","crypto-section"),head=$("div","crypto-section-title");head.append($("h5","",title));root.append(head);if(value?.official){const grid=$("div","crypto-grid");grid.append(cryptoPane("官方说明",value.official,true),cryptoPane("本地代码实测",value.localVerification),cryptoPane("真实第三方互操作",value.interoperability));root.append(grid)}else root.append(kvList(cryptoRows(value)));return root}
function cryptographyCard(signing,encryption){const structured=Boolean(signing?.official||encryption?.official),c=$("div",`card crypto-card${structured?" wide":""}`);c.append($("h4","","密码学实现与验证"),cryptoSection("签名 / 验签",signing),cryptoSection("加密 / 解密",encryption));return c}
function docsCard(docs){const c=$("div","card"),h=$("h4","","第三方文档地址"),list=$("div","doc-links");c.append(h);if(!docs?.length){c.append($("div","empty","未记录"));return c}docs.forEach(d=>{if(/^https?:\/\//i.test(d.url)){const a=$("a","",d.url);a.href=d.url;a.target="_blank";a.rel="noreferrer";list.append(a)}else list.append(chip(d.url,true))});c.append(list);return c}
function scopeCard(scope){const c=$("div","card"),h=$("h4","","本次接口范围");c.append(h);(scope||[]).forEach(item=>{const row=$("div","kv-row");const left=$("div","kv-key");left.append(chip(item.methodHint||"API",true));row.append(left,$("div","kv-value",`${item.requestedName||""} · ${item.pathHint||""}`));c.append(row)});return c}
function scenarioInputCard(scenarios){const items=(scenarios||[]).map(x=>x.name).filter(Boolean),c=$("div","card"),h=$("h4","",`测试场景${items.length?`（${items.length}）`:""}`);c.append(h);if(!items.length){c.append($("div","empty","未提供或推导场景"));return c}const list=$("ul","scenario-name-list");items.forEach(name=>list.append($("li","",name)));c.append(list);return c}
function terminologyCard(terms){const c=$("div","card wide"),h=$("h4","","术语与协议字面值");c.append(h);const provider=terms?.provider||{};c.append(kvCard("提供方",[[ "规范名称",provider.canonical],[ "别名",(provider.aliases||[]).join("、")]]));const business=Object.entries(terms?.businessTerms||{}).map(([k,v])=>`${k} = ${v}`);c.append(chipRow(business),chipRow(terms?.protocolLiterals||[],true));return c}
function statusCodes(value){if(typeof value==="number"&&value>=100&&value<=599)return [value];const text=typeof value==="string"?value:JSON.stringify(value);return [...new Set((text.match(/\b[1-5]\d{2}\b/g)||[]).map(Number))]}
function isMismatch(row){if(row?.verdict)return row.verdict==="DOCUMENT_MISMATCH";if(empty(row?.documented)||empty(row?.observed)||empty(row?.correction))return false;const observed=primitive(row.observed);if(/未执行|未发送|not executed/i.test(observed))return false;if(!empty(row.code)){const documentedCodes=statusCodes(row.code),observedCodes=statusCodes(row.observed);if(documentedCodes.length&&observedCodes.length)return !observedCodes.some(code=>documentedCodes.includes(code))}const text=[row.documented,row.observed,row.correction].map(primitive).join(" ");return /(废弃|删除|改读|新增|不具备|自行幂等|自行提供|客户端限制|前置限制|按整数秒|不要假设|不能|不完全同构|未出现|官方未|未声明|与.+不符|缺陷|重复.+新 ID|返回(?: HTTP)? 500|返回 201|不是|改为|视为必填|整体按必填|当前实现|也覆盖|不等于)/i.test(text)}
function cellNode(row,column){const value=row[column.key];const td=$("td",column.key==="field"?"field-name":"");if(empty(value)){td.textContent="—";return td}if(column.key==="field"){td.append($("code","",primitive(value)));return td}if(column.key==="verdict"&&verdictValues.has(value)){td.append(badge(value));return td}if(column.key==="evidenceIds"){td.append($("span","evidence",(value||[]).join(" · ")||"—"));return td}const mismatch=isMismatch(row);if(column.key==="documented"&&mismatch){td.append($("del","doc-old",primitive(value)));return td}if(column.key==="observed"&&mismatch){td.append($("span","observed-new",primitive(value)));return td}if(column.key==="correction"&&mismatch){td.append($("ins","correction-new",primitive(value)));return td}td.textContent=primitive(value);return td}
